services:
  api:
    image: ${API_IMAGE:-knowledge-rss-api:local}
    build:
      context: ./apps/api
      args:
        PYTHON_IMAGE: ${API_PYTHON_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${API_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${API_PIP_EXTRA_INDEX_URL:-}
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
