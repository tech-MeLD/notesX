services:
  api:
    image: ${API_IMAGE:-knowledge-rss-api:local}
    build:
      context: ./apps/api
      args:
        PYTHON_IMAGE: ${API_PYTHON_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${API_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${API_PIP_EXTRA_INDEX_URL:-}
    env_file:
      - ./apps/api/.env
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  api-proxy:
    image: caddy:2.10-alpine
    depends_on:
      - api
    environment:
      API_PUBLIC_HOST: ${API_PUBLIC_HOST:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
