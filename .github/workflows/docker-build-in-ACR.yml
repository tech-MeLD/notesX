name: Build and Push API Image to ACR

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-build-in-ACR.yml"
      - "apps/api/**"
      - "docker-compose.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: acr-api-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_REPOSITORY: my_github_projects/notesx

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-acr
          cache-to: type=gha,mode=max,scope=api-acr
